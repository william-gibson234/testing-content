name: Sync Content to Supabase

# Triggers on every push to master.
# Reads the git diff between the previous and current commit, then upserts
# added/modified files into Supabase and deletes rows for removed files.
# Requires two repository secrets:
#   SUPABASE_URL         — project URL (same value as in constants.ts)
#   SUPABASE_SERVICE_KEY — service role key (bypasses RLS for write access)

on:
  push:
    branches: [master]

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history needed for accurate diffs on any push

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install @supabase/supabase-js js-yaml

      - name: Sync to Supabase
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          BEFORE_SHA: ${{ github.event.before }}
          AFTER_SHA: ${{ github.sha }}
        run: |
          node - << 'SYNC_EOF'
          (async () => {
            const { execSync } = require('child_process');
            const fs   = require('fs');
            const path = require('path');
            const yaml = require('js-yaml');
            const { createClient } = require('@supabase/supabase-js');

            const supabase = createClient(
              process.env.SUPABASE_URL,
              process.env.SUPABASE_SERVICE_KEY
            );

            // Maps the top-level Content subfolder name to its Supabase table.
            const FOLDER_TO_TABLE = {
              Items:       'items',
              Threads:     'threads',
              Techniques:  'techniques',
              Reflections: 'reflections',
            };

            // Maps Supabase table name back to the canonical type string.
            const TABLE_TO_TYPE = {
              items:       'item',
              threads:     'thread',
              techniques:  'technique',
              reflections: 'reflection',
            };

            // Join tables to clear before re-inserting links on update.
            // Ensures that links removed from frontmatter are reflected in the DB.
            const JOIN_CLEANUP = {
              thread:     [{ table: 'items_threads_join',      col: 'thread_id'    },
                           { table: 'threads_techniques_join', col: 'thread_id'    }],
              item:       [{ table: 'items_threads_join',      col: 'item_id'      }],
              technique:  [{ table: 'threads_techniques_join', col: 'technique_id' }],
              reflection: [],
            };

            // Routes a type:linkedType pair to the correct join table and column order.
            const JOIN_ROUTES = {
              'thread:item':      { table: 'items_threads_join',      cols: ['thread_id',    'item_id'      ] },
              'thread:technique': { table: 'threads_techniques_join', cols: ['thread_id',    'technique_id' ] },
              'item:thread':      { table: 'items_threads_join',      cols: ['item_id',      'thread_id'    ] },
              'technique:thread': { table: 'threads_techniques_join', cols: ['technique_id', 'thread_id'    ] },
            };

            // Extracts the top-level folder from a repo-relative path and returns its table.
            function getTable(filePath) {
              return FOLDER_TO_TABLE[filePath.split('/')[0]] ?? null;
            }

            // Derives the canonical type string from the first character of a UID.
            // Mirrors UID_TYPE_CODES in constants.ts.
            function typeFromUID(uid) {
              const map = { I: 'item', T: 'thread', N: 'technique', R: 'reflection' };
              return map[uid?.[0]] ?? null;
            }

            // Splits a markdown file into parsed frontmatter object and body string.
            // Returns null if the file does not start with a valid YAML frontmatter block.
            function parseMarkdown(raw) {
              if (!raw.startsWith('---\n')) return null;
              const end = raw.indexOf('\n---\n', 4);
              if (end === -1) return null;
              try {
                const fm   = yaml.load(raw.slice(4, end));
                const body = raw.slice(end + 5).trim();
                return { fm, body };
              } catch {
                return null;
              }
            }

            // Looks up the Supabase row ID for a given UID in the given type's table.
            // Returns null if not found or on error.
            async function resolveUID(uid, type) {
              const tableMap = { item: 'items', thread: 'threads', technique: 'techniques', reflection: 'reflections' };
              const t = tableMap[type];
              if (!t) return null;
              const { data } = await supabase.from(t).select('id').eq('uid', uid).single();
              return data?.id ?? null;
            }

            // Determine the diff base. On the very first push to an empty repo,
            // github.event.before is all zeros. In that case diff against the git
            // empty-tree object so all files in the initial commit are treated as added.
            const before = process.env.BEFORE_SHA;
            const after  = process.env.AFTER_SHA;
            const base   = before === '0000000000000000000000000000000000000000'
              ? '4b825dc642cb6eb9a060e54bf8d69288fbee4904'
              : before;

            const diffOut = execSync(`git diff --name-status ${base} ${after}`).toString().trim();
            if (!diffOut) { console.log('No .md changes to sync.'); return; }

            // Parse each diff line into { status, file }.
            // Rename lines have format "R100\told\tnew"; status[0] is 'R' and
            // parts[parts.length-1] is the new path — treated as a modification.
            const changes = diffOut.split('\n')
              .map(line => {
                const [s, ...parts] = line.split('\t');
                return { status: s[0], file: parts[parts.length - 1] };
              })
              .filter(c => c.file.endsWith('.md'));

            // --- Upserts (added, modified, renamed) ---
            for (const { status, file } of changes.filter(c => 'AMR'.includes(c.status))) {
              const table = getTable(file);
              if (!table) { console.log(`[SKIP] ${file}: no table mapping for folder`); continue; }

              const raw = fs.readFileSync(file, 'utf8');
              const parsed = parseMarkdown(raw);
              if (!parsed) { console.log(`[SKIP] ${file}: missing or invalid frontmatter`); continue; }

              const { fm, body } = parsed;
              const { title, type, subtype, keywords, linked } = fm;

              // uid is derived from the filename — it is the authoritative source and is
              // never stored in frontmatter. This prevents users from corrupting the
              // uid/filename invariant by editing the frontmatter directly.
              const uid = path.basename(file, '.md');

              if (!title || !type || !subtype) {
                console.log(`[SKIP] ${file}: frontmatter missing required fields (title/type/subtype)`);
                continue;
              }

              const row = {
                uid,
                title,
                subtype,
                content:  body,
                keywords: (keywords && keywords.length > 0) ? keywords : null,
              };

              // Reflections store their linked item as a direct FK (item_id) rather
              // than through a join table. Resolve the linked item UID to a row ID.
              // linked entries are stored as plain UID strings in frontmatter.
              if (type === 'reflection' && linked?.length > 0) {
                const itemUID = linked[0];
                const itemId = itemUID ? await resolveUID(itemUID, 'item') : null;
                if (itemId) {
                  row.item_id = itemId;
                } else {
                  console.warn(`[WARN] ${file}: could not resolve linked item uid ${itemUID ?? linked[0]}`);
                }
              }

              const { data, error } = await supabase
                .from(table)
                .upsert(row, { onConflict: 'uid' })
                .select('id')
                .single();

              if (error) { console.error(`[FAIL] ${file}: ${error.message}`); continue; }
              console.log(`[OK] ${file} → ${uid} (id=${data.id})`);

              // Clear existing join table rows for this entry before re-inserting.
              // This ensures that links removed from frontmatter are removed from the DB.
              for (const { table: jt, col } of JOIN_CLEANUP[type] ?? []) {
                await supabase.from(jt).delete().eq(col, data.id);
              }

              // Insert join table rows for each linked entry (non-reflections only).
              // linked entries are stored as plain UID strings; type is derived from the UID prefix.
              for (const rawEntry of (linked ?? [])) {
                if (type === 'reflection') continue;
                const entryType = typeFromUID(rawEntry);
                if (!entryType) { console.warn(`[WARN] ${file}: could not derive type from linked entry "${rawEntry}"`); continue; }
                const entry = { uid: rawEntry, type: entryType };
                const route = JOIN_ROUTES[`${type}:${entry.type}`];
                if (!route) { console.warn(`[WARN] ${file}: no join route for ${type}:${entry.type}`); continue; }
                const linkedId = await resolveUID(entry.uid, entry.type);
                if (!linkedId) { console.warn(`[WARN] ${file}: could not resolve linked uid ${entry.uid}`); continue; }
                const joinRow = { [route.cols[0]]: data.id, [route.cols[1]]: linkedId };
                // check for an existing row before inserting — prevents duplicate join rows
                // when both sides of a relationship declare the link (e.g. A links to B and
                // B links to A both map to the same row in the join table)
                const { count } = await supabase
                  .from(route.table)
                  .select('*', { count: 'exact', head: true })
                  .eq(route.cols[0], joinRow[route.cols[0]])
                  .eq(route.cols[1], joinRow[route.cols[1]]);
                if (count && count > 0) {
                  console.log(`  [SKIP] ${route.table}: join row already exists for ${entry.uid}`);
                } else {
                  const { error: je } = await supabase.from(route.table).insert(joinRow);
                  if (je) console.warn(`[WARN] ${route.table}: ${je.message}`);
                  else    console.log(`  linked ${entry.uid} in ${route.table}`);
                }
              }
            }

            // --- Deletions ---
            // The file is gone, so we derive the uid from the filename and the
            // table from the folder. Join table cleanup happens first so FK
            // constraints are not violated if CASCADE DELETE is not configured.
            for (const { file } of changes.filter(c => c.status === 'D')) {
              const table = getTable(file);
              if (!table) continue;

              const uid  = path.basename(file, '.md');
              const type = TABLE_TO_TYPE[table];

              // Fetch the row ID so we can clean up join tables before deleting.
              const { data: existing } = await supabase
                .from(table).select('id').eq('uid', uid).single();

              if (existing) {
                for (const { table: jt, col } of JOIN_CLEANUP[type] ?? []) {
                  await supabase.from(jt).delete().eq(col, existing.id);
                }
              }

              const { error } = await supabase.from(table).delete().eq('uid', uid);
              if (error) console.error(`[FAIL] delete ${uid} from ${table}: ${error.message}`);
              else        console.log(`[DEL] ${uid} from ${table}`);
            }

          })().catch(e => { console.error(e); process.exit(1); });
          SYNC_EOF
